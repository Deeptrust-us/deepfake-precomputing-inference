# Audio Quad-Stream Deepfake Detection Configuration

# Data Configuration (audio)
data:
  data_root: "dataset"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  train_labels_file: "dataset/split_1/labels_train.json"
  val_labels_file: "dataset/split_1/labels_val.json"
  test_labels_file: "dataset/split_1/labels_test.json"
  features_dir: "dataset/features"

# Model Architecture (audio quad-stream)
model:
  # Backbone per stream (1-channel 224x224 time-frequency image)
  backbone: "resnet18"   # supported: resnet18
  feature_dim: 256       # per-stream embedding size
  fusion_dim: 512        # fusion MLP hidden size
  dropout: 0.6
  pretrained: true       # if true, may download torchvision weights
  freeze_backbones: false
  # If true, freezes only the STFT stream backbones (segment_stft_stream + full_stft_stream).
  freeze_stft_backbones: true
  # If true, freezes only the Log-Mel stream backbones (segment_logmel_stream + full_logmel_stream).
  freeze_logmel_backbones: false

# Training Configuration (audio)
training:
  batch_size: 32
  num_epochs: 5
  learning_rate: 5e-5
  optimizer: "adam"        # or "sgd"
  momentum: 0.9            # used only for SGD
  weight_decay: 1e-5

  # Loss
  use_focal_loss: true
  focal_loss_alpha: 0.25  # Weighting factor for positive class
  focal_loss_gamma: 2.0  # Focusing parameter (higher = focus more on hard examples)
  oversample_real: false
  real_oversample_ratio: 2.0

  # Scheduler
  scheduler: "cosine"      # or "step"
  scheduler_params:
    step_size: 5
    gamma: 0.1

  early_stopping:
    patience: 10
    metric: "val_auc"

  num_workers: 10
  pin_memory: true

# Evaluation
evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "auc", "eer"]
  # If true, compute audio features on the fly during evaluation (slow).
  compute_on_the_fly: false

# Paths
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  results_dir: "results"

